name: Publish to crates.io

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    environment: release
    env:
      CARGO_TERM_COLOR: always
      HIK_MVS_SKIP_NATIVE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo version
        if: github.event_name == 'push'
        shell: bash
        run: |
          manifest_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$manifest_version" = "$tag_version" || {
            echo "tag version $tag_version does not match Cargo version $manifest_version" >&2
            exit 1
          }

      - name: Validate package contents
        run: cargo package --locked --no-verify

      - name: Authenticate with crates.io
        id: crates_io_auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        run: cargo publish --locked --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_io_auth.outputs.token }}
